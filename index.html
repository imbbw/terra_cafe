<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Terra Cafe</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="loadingState" class="loading-state">Loading catalogue...</div>

    <button id="cartToggle" type="button" class="cart-toggle hidden" aria-label="View cart">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path fill="currentColor" d="M7 18c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1Zm10 0c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1ZM7.17 14h9.7c.75 0 1.4-.41 1.74-1.03l2.02-3.65a1 1 0 0 0-.88-1.48H6.21L5.27 4H2v2h2l2.6 11.59A2 2 0 0 0 8.55 19h10.4v-2H8.55a.25.25 0 0 1-.24-.2L7.99 15h-.82Z"></path>
      </svg>
      <span id="cartBadge" class="cart-badge hidden" aria-hidden="true">0</span>
    </button>

    <div id="landingScreen" class="landing-screen hidden">
      <div id="landingBg" class="landing-bg"></div>
      <div class="landing-overlay"></div>
      <div class="landing-content">
        <p id="landingLead" class="landing-lead"></p>
        <div id="landingTitleImageWrap" class="landing-title-image hidden">
          <img id="landingTitleImage" alt="">
        </div>
        <h1 id="landingTitle" class="landing-title"></h1>
        <p id="landingSubtitle" class="landing-subtitle"></p>
        <button id="startBrowsingBtn" type="button" class="primary-cta"></button>
      </div>
    </div>

    <div id="catalogLayout" class="catalog-layout hidden">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <span id="sidebarTitle" class="sidebar-title"></span>
          <div class="sidebar-header-actions">
            <button id="themeToggle" type="button" class="theme-toggle" aria-label="Toggle theme"></button>
            <button id="sidebarClose" type="button" class="sidebar-close-btn" aria-label="Close sections">×</button>
          </div>
        </div>

        <div class="sidebar-search">
          <label for="sidebarSearchInput" class="sr-only">Search sections</label>
          <div class="sidebar-search-input-wrapper">
            <input id="sidebarSearchInput" type="search" class="sidebar-search-input" placeholder="Search…" autocomplete="off">
            <button id="sidebarSearchClear" type="button" class="sidebar-search-clear-btn hidden" aria-label="Clear search">×</button>
          </div>
          <div id="sidebarSearchBlock" class="hidden">
            <div class="sidebar-search-results-label">Matches</div>
            <div id="sidebarSearchResults" class="sidebar-search-results" role="listbox" aria-label="Search results"></div>
          </div>
        </div>

        <div class="sidebar-scroll">
          <div id="sectionList"></div>
          <div class="sidebar-footer">
            <p class="qr-label">Scan on your mobile to see this page</p>
            <img id="qrImage" class="qr-image hidden" alt="QR code for this catalogue page" loading="lazy">
            <code id="qrUrl" class="qr-url hidden"></code>
          </div>
        </div>
      </aside>

      <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

      <main class="viewer">
        <button id="openSidebarBtn" type="button" class="toggle-sidebar-btn hidden" aria-label="Open catalogue sections">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path fill="currentColor" d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"></path>
          </svg>
        </button>

        <div class="viewer-body">
          <div id="pageWrapper" class="page-wrapper">
            <div class="page-viewport">
              <img id="pagePlaceholder" class="page-image page-image-placeholder hidden" alt="" aria-hidden="true" draggable="false">
              <div id="pageCarousel" class="page-carousel">
                <div class="page-cell">
                  <img id="prevPageImage" class="page-image" alt="" aria-hidden="true" draggable="false">
                </div>
                <div class="page-cell">
                  <img id="pageImage" class="page-image" alt="Catalogue page" draggable="false">
                </div>
                <div class="page-cell">
                  <img id="nextPageImage" class="page-image" alt="" aria-hidden="true" draggable="false">
                </div>
              </div>
            </div>
          </div>

          <div id="viewerCartBar" class="viewer-cart-bar hidden">
            <div class="viewer-cart-meta">
              <span id="viewerCartItem" class="viewer-cart-item"></span>
              <span id="viewerCartPrice" class="viewer-cart-price"></span>
            </div>
            <button id="addToCartBtn" type="button" class="btn btn-primary">Add to cart</button>
          </div>

          <div class="thumbnail-strip">
            <div id="thumbnailScroll" class="thumbnail-scroll"></div>
          </div>

          <div class="viewer-mobile-title">
            <span id="mobileActiveSection" class="mobile-active-section"></span>
          </div>

          <div class="viewer-page-nav" role="group" aria-label="Page navigation">
            <button id="prevPageBtn" type="button" class="viewer-nav-btn" aria-label="Previous page">◀</button>
            <button id="pageDisplayBtn" type="button" class="viewer-page-indicator" aria-label="Jump to page"></button>
            <button id="nextPageBtn" type="button" class="viewer-nav-btn" aria-label="Next page">▶</button>
          </div>
        </div>
      </main>
    </div>

    <a id="whatsappLink" class="whatsapp-link hidden" href="#" target="_blank" rel="noreferrer" aria-label="Chat on WhatsApp">
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <path fill="currentColor" d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"></path>
      </svg>
    </a>

    <div id="toastSnackbar" class="toast-snackbar hidden" role="status" aria-live="polite" aria-atomic="true"></div>

    <div id="cartModalOverlay" class="cart-modal-overlay hidden" role="presentation">
      <div class="cart-modal" role="dialog" aria-modal="true" aria-labelledby="cartModalTitle">
        <div class="cart-modal-header">
          <h2 id="cartModalTitle" class="cart-modal-title">Your cart</h2>
          <button id="cartModalClose" type="button" class="cart-modal-close" aria-label="Close cart">×</button>
        </div>
        <div id="cartModalBody" class="cart-modal-body"></div>
        <div class="cart-modal-footer">
          <div class="cart-modal-totals">
            <span id="cartTotalItems" class="cart-modal-total-items">0 items</span>
            <span id="cartTotalPrice" class="cart-modal-total-price">MYR 0</span>
          </div>
          <a id="submitOrderLink" class="btn-whatsapp" href="#" target="_blank" rel="noreferrer">Submit order</a>
          <p id="cartModalHint" class="cart-modal-hint hidden"></p>
        </div>
      </div>
    </div>

  </body>
</html>
